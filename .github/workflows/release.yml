name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      - name: Build and Package Release Assets
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          TARGETS=(
            "x86_64-linux-musl"
            "aarch64-linux-musl"
            "x86_64-linux"
            "aarch64-linux"
            "x86_64-macos"
            "aarch64-macos"
            "x86_64-windows"
            "aarch64-windows"
          )
          
          for TARGET in "${TARGETS[@]}"; do
            echo "Building for $TARGET..."
            zig build -Doptimize=ReleaseSmall -Dtarget="$TARGET"
            
            if [[ "$TARGET" == *"windows"* ]]; then
              BIN_NAME="zzh.exe"
              ASSET_NAME="zzh-${VERSION}-${TARGET}.zip"
              cd zig-out/bin
              zip -r "../../${ASSET_NAME}" "${BIN_NAME}"
              cd ../..
            else
              BIN_NAME="zzh"
              ASSET_NAME="zzh-${VERSION}-${TARGET}.tar.gz"
              cd zig-out/bin
              tar -czf "../../${ASSET_NAME}" "${BIN_NAME}"
              cd ../..
            fi
            
            rm -rf zig-out
          done

      - name: Package Shells and Plugins
        shell: bash
        run: |
          mkdir -p release-packages
          
          # Package all shells
          for dir in shells/*/; do
            if [ -d "$dir" ]; then
              base=$(basename "$dir")
              tar -czf "release-packages/${base}.tar.gz" -C shells "$base"
            fi
          done
          
          # Package all plugins
          for dir in plugins/*/; do
            if [ -d "$dir" ]; then
              base=$(basename "$dir")
              tar -czf "release-packages/${base}.tar.gz" -C plugins "$base"
            fi
          done

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zzh-${{ github.ref_name }}-*.tar.gz
            zzh-${{ github.ref_name }}-*.zip
            release-packages/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
